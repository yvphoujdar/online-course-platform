<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream | Pro Learning Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="blob"></div>
    <div class="blob-2"></div>
    <nav>
        <div class="logo" onclick="resetView()" style="cursor:pointer">Edu<span>Stream</span></div>
        <div class="nav-controls">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search skills...">
            </div>
            <div class="select-wrapper">
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="Programming">Development</option>
                    <option value="Marketing">Marketing & Growth</option>
                    <option value="Data Science">Data & AI</option>
                    <option value="Business">Business Analysis</option>
                </select>
            </div>
        </div>
        <div class="cart-status">Saved: <span id="savedCount">0</span></div>
    </nav>
    <header class="hero" id="mainHero">
        <h1>Master New Skills with <span>Expert</span> Courses</h1>
        <p>Explore professional-grade curriculums designed for the next generation of leaders.</p>
    </header>
    <header class="category-header" id="categoryHeader" style="display: none;">
        <div class="header-content">
            <button class="back-btn" onclick="resetView()">← Back to All</button>
            <h1 id="catTitle">Category Title</h1>
            <p id="catDesc">Category Description goes here.</p>
        </div>
    </header>
    <main id="courseGrid"></main>
    <div id="enrollModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-header">
                <h2>Join the Class</h2>
                <p>Start your journey with EduStream today.</p>
            </div>
            <form id="enrollForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="e.g. Adit Sharma" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@email.com" required>
                </div>
                <button type="submit" id="submitBtn" class="enroll-confirm">Access Curriculum</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
